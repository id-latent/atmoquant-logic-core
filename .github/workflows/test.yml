# ==============================================================================
# .github/workflows/test.yml — CI Pipeline AQL NODE
# ==============================================================================
#
# Trigger: setiap push ke main/develop, dan setiap Pull Request ke main
#
# Yang dilakukan:
#   1. Setup Python 3.11
#   2. Install production + dev dependencies
#   3. Jalankan static analysis tests (test_fixes.py)
#   4. Jalankan mock tests (pytest)
#   5. Report coverage
#
# Jika semua test lulus → Railway deploy otomatis (jika Railway connected ke repo)
# Jika ada test gagal → CI merah, deploy diblokir
#
# ==============================================================================

name: AQL NODE — Test Suite

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout code ─────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Setup Python 3.11 (sama dengan Dockerfile) ────────────────────────
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ── 3. Install dependencies ───────────────────────────────────────────────
      - name: Install production dependencies
        run: pip install -r requirements.txt

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      # ── 4. Static analysis tests (test_fixes.py) ─────────────────────────────
      - name: Run static analysis tests
        run: python test_fixes.py
        env:
          # Fake env vars agar settings.py tidak crash
          POLY_PRIVATE_KEY: "0xaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa"
          TERMINAL_WEBHOOK_URL: "https://discord.com/api/webhooks/0/test"
          WEATHER_WEBHOOK_URL: "https://discord.com/api/webhooks/1/test"
          TRADE_WEBHOOK_URL: "https://discord.com/api/webhooks/2/test"
          ALERTS_WEBHOOK_URL: "https://discord.com/api/webhooks/3/test"

      # ── 5. Mock tests (pytest) ────────────────────────────────────────────────
      - name: Run mock tests with pytest
        run: pytest --tb=short -v
        env:
          POLY_PRIVATE_KEY: "0xaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa"
          TERMINAL_WEBHOOK_URL: "https://discord.com/api/webhooks/0/test"
          WEATHER_WEBHOOK_URL: "https://discord.com/api/webhooks/1/test"
          TRADE_WEBHOOK_URL: "https://discord.com/api/webhooks/2/test"
          ALERTS_WEBHOOK_URL: "https://discord.com/api/webhooks/3/test"

      # ── 6. Summary ────────────────────────────────────────────────────────────
      - name: Test summary
        if: always()
        run: |
          echo "Static tests: test_fixes.py"
          echo "Mock tests: pytest (probability, gamma_client, consensus, risk)"
          echo "All tests must pass before Railway deploy"
