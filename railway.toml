[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "python -m uvicorn main:app --host 0.0.0.0 --port $PORT --log-level info"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 5

[[services]]
name = "aql-engine"
